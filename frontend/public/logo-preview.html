<!DOCTYPE html>
<html>
<head>
  <title>Txilms Logo Preview</title>
  <style>
    body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Inter, system-ui, sans-serif; color: white; gap: 40px; }
    h1 { color: #e50914; margin: 0; }
    p { color: #8b8b9e; margin: 0; font-size: 14px; }

    .logo-box {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .logo-box img {
      width: 70%;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(229,9,20,0.5));
    }

    .sizes { display: flex; gap: 48px; align-items: flex-end; }
    .size-item { text-align: center; }
    .size-label { color: #8b8b9e; font-size: 11px; margin-top: 8px; }

    .navbar-demo {
      background: #14141f;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .navbar-label { font-size: 11px; color: #8b8b9e; margin-top: 10px; }
  </style>
</head>
<body>
  <div>
    <h1 style="text-align:center;">Txilms Logo</h1>
    <p style="text-align:center;">PNG sobre fondo negro redondeado</p>
  </div>

  <!-- Grande -->
  <div class="logo-box" style="width: 200px; height: 200px; border-radius: 40px;">
    <img src="/Txilmslogo.png" alt="Txilms">
  </div>

  <!-- Todos los tamaños -->
  <div class="sizes">
    <div class="size-item">
      <div class="logo-box" style="width: 28px; height: 28px; border-radius: 6px;">
        <img src="/Txilmslogo.png" alt="">
      </div>
      <div class="size-label">sm (28px)</div>
    </div>
    <div class="size-item">
      <div class="logo-box" style="width: 40px; height: 40px; border-radius: 10px;">
        <img src="/Txilmslogo.png" alt="">
      </div>
      <div class="size-label">md (40px)</div>
    </div>
    <div class="size-item">
      <div class="logo-box" style="width: 64px; height: 64px; border-radius: 16px;">
        <img src="/Txilmslogo.png" alt="">
      </div>
      <div class="size-label">lg (64px)</div>
    </div>
    <div class="size-item">
      <div class="logo-box" style="width: 96px; height: 96px; border-radius: 24px;">
        <img src="/Txilmslogo.png" alt="">
      </div>
      <div class="size-label">xl (96px)</div>
    </div>
  </div>

  <!-- Demo navbar -->
  <div>
    <div class="navbar-demo">
      <div class="logo-box" style="width: 40px; height: 40px; border-radius: 10px;">
        <img src="/Txilmslogo.png" alt="">
      </div>
      <span style="color: white; font-weight: 800; font-size: 18px;">Txilms</span>
    </div>
    <div class="navbar-label" style="text-align:center;">Así se ve en la navbar</div>
  </div>
</body>
</html>
